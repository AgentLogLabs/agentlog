<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
  <!-- Scroll / log document body -->
  <rect x="2" y="1" width="10" height="13" rx="1.5" fill="currentColor" opacity="0.15"/>
  <rect x="2" y="1" width="10" height="13" rx="1.5" stroke="currentColor" stroke-width="1.2" fill="none"/>
  <!-- Text lines representing log entries -->
  <line x1="4.5" y1="4.5" x2="9.5" y2="4.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <line x1="4.5" y1="6.5" x2="9.5" y2="6.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <line x1="4.5" y1="8.5" x2="7.5" y2="8.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <!-- AI spark / bot indicator dot at bottom-right -->
  <circle cx="11" cy="12" r="2.5" fill="currentColor"/>
  <line x1="11" y1="10.5" x2="11" y2="11" stroke="white" stroke-width="0.8" stroke-linecap="round"/>
  <circle cx="11" cy="12" r="0.5" fill="white"/>
</svg>
