# ─────────────────────────────────────────────────────────────────────────────
# AgentLog VSCode Extension 多平台构建与发布
#
# 支持平台: darwin-x64, darwin-arm64, linux-x64, win32-x64
# ─────────────────────────────────────────────────────────────────────────────
name: Build VSIX (Multi-Platform)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'packages/vscode-extension/**'
      - 'packages/backend/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'packages/vscode-extension/**'
      - 'packages/backend/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 构建矩阵 ──────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-x64
            runner: macos-13
            platform: darwin
            arch: x64
          - target: darwin-arm64
            runner: macos-14
            platform: darwin
            arch: arm64
          - target: linux-x64
            runner: ubuntu-22.04
            platform: linux
            arch: x64
          - target: win32-x64
            runner: windows-2019
            platform: win32
            arch: x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION || '9' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm build:shared

      - name: Build backend (triggers native module rebuild)
        run: pnpm build:backend
        env:
          # 强制 node-gyp 为目标架构构建 better-sqlite3
          npm_config_arch: ${{ matrix.arch }}
          npm_config_platform: ${{ matrix.platform }}

      - name: Build VSCode extension
        run: pnpm build:ext

      - name: Package VSIX
        run: |
          cd packages/vscode-extension
          pnpm exec vsce package --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentlog-vscode-${{ matrix.target }}
          path: packages/vscode-extension/*.vsix
          retention-days: 30

  # ── 发布 (仅在 tag 时) ─────────────────────────────────────────────────────
  publish:
    name: Publish to Marketplace
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Install vsce globally
        run: npm install -g @vscode/vsce

      - name: Publish to Marketplace (darwin-x64)
        run: vsce publish --packagePath artifacts/agentlog-vscode-darwin-x64/agentlog-*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Marketplace (darwin-arm64)
        run: vsce publish --packagePath artifacts/agentlog-vscode-darwin-arm64/agentlog-*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Marketplace (linux-x64)
        run: vsce publish --packagePath artifacts/agentlog-vscode-linux-x64/agentlog-*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Marketplace (win32-x64)
        run: vsce publish --packagePath artifacts/agentlog-vscode-win32-x64/agentlog-*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}